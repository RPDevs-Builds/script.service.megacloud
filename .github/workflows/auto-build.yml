name: Megacloud Auto-Sync & Build

on:
  schedule:
    - cron: '0 */6 * * *' # Run every 6 hours to keep keys fresh
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-and-build:
    runs-on: [self-hosted, linux64]
    steps:
      - name: Checkout addon repository
        uses: actions/checkout@v4

      - name: Checkout mega-embed-2 upstream
        run: |
          git clone https://bitbucket.org/geordilaforge/mega-embed-2.git mega-embed-2-upstream

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # -----------------------------------------------------------------------
      # Step 1: Sync upstream mega-embed-2 crypto constants
      # -----------------------------------------------------------------------
      - name: Run transform script
        id: transform
        run: |
          set +e
          python tools/transform.py mega-embed-2-upstream .
          exit_code=$?
          set -e
          if [ $exit_code -eq 0 ]; then
            echo "changes_made=true" >> $GITHUB_OUTPUT
          elif [ $exit_code -eq 2 ]; then
            echo "changes_made=false" >> $GITHUB_OUTPUT
          else
            echo "Transform script failed!"
            exit 1
          fi

      # -----------------------------------------------------------------------
      # Step 2: Fetch and mirror decryption keys from upstream sources
      # -----------------------------------------------------------------------
      # The original keys repo (yogesh-hacker/MegacloudKeys) was DMCA'd.
      # This step attempts to fetch keys from known mirrors and stores a
      # local copy in keys/keys.json so our addon can self-host them via
      # raw.githubusercontent.com, independent of any single upstream.
      # -----------------------------------------------------------------------
      - name: Fetch decryption keys
        id: fetch_keys
        run: |
          set +e
          python tools/fetch_keys.py
          exit_code=$?
          set -e
          if [ $exit_code -eq 0 ]; then
            echo "keys_updated=true" >> $GITHUB_OUTPUT
          else
            echo "keys_updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure Git
        if: steps.transform.outputs.changes_made == 'true' || steps.fetch_keys.outputs.keys_updated == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit changes
        if: steps.transform.outputs.changes_made == 'true' || steps.fetch_keys.outputs.keys_updated == 'true'
        run: |
          git add resources/lib/megacloud.py addon.xml keys/keys.json
          # Only commit if there are actually staged changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            COMMIT_MSG="Auto-sync: "
            if [ "${{ steps.transform.outputs.changes_made }}" == "true" ]; then
              COMMIT_MSG="${COMMIT_MSG}upstream crypto constants"
            fi
            if [ "${{ steps.fetch_keys.outputs.keys_updated }}" == "true" ]; then
              if [ "${{ steps.transform.outputs.changes_made }}" == "true" ]; then
                COMMIT_MSG="${COMMIT_MSG} + "
              fi
              COMMIT_MSG="${COMMIT_MSG}decryption keys"
            fi
            git commit -m "$COMMIT_MSG"
            git push
          fi

      - name: Build Zip Release
        id: build_zip
        run: |
          python tools/build_addon.py
          # Output is handled by the python script (::set-output)

      - name: Create Release
        if: steps.transform.outputs.changes_made == 'true' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.build_zip.outputs.version }}
          name: v${{ steps.build_zip.outputs.version }}
          files: ${{ steps.build_zip.outputs.zip_path }}
          body: "Automated release synced with upstream mega-embed-2."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
